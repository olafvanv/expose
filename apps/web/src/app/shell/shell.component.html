<header class="shell__header">
  <div class="shell__header-left">
    @if (headerService.showBackButton()) {
      <button class="shell__header-btn" (click)="onBack()" aria-label="Go back">
        <span class="shell__header-icon" aria-hidden="true">
          <ng-icon name="lucideArrowLeft"></ng-icon>
        </span>
      </button>
    }
  </div>

  <h1 class="shell__header-title">{{ headerService.title() }}</h1>

  <div class="shell__header-right">
    @for (btn of headerService.actionButtons(); track btn.id) {
      <button
        class="shell__header-btn"
        [class.shell__header-btn--text]="btn.type === 'text'"
        (click)="btn.action()"
        [disabled]="btn.disabled"
        [attr.aria-label]="btn.ariaLabel || btn.label">
        @if (btn.type === 'icon' && btn.icon) {
          <span class="shell__header-icon" aria-hidden="true">
            <ng-icon [name]="btn.icon"></ng-icon>
          </span>
        } @else {
          {{ btn.label }}
        }
      </button>
    }
  </div>
</header>

<!-- Add Menu Overlay Backdrop -->
@if (isAddMenuOpen()) {
  <div class="shell__add-menu-scrim" (click)="isAddMenuOpen.set(false)" aria-hidden="true"></div>
}

<!-- Floating Quick Action Menu -->
<div class="shell__add-menu" [class.shell__add-menu--open]="isAddMenuOpen()">
  <button class="shell__add-menu-item" (click)="onAddOption('session')">
    <span class="shell__add-menu-icon" aria-hidden="true">
      <ng-icon name="lucideCamera"></ng-icon>
    </span>
    <span class="shell__add-menu-label">Add Session</span>
  </button>
  
  <button class="shell__add-menu-item" (click)="onAddOption('roll')">
    <span class="shell__add-menu-icon" aria-hidden="true">
      <ng-icon name="lucideFilm"></ng-icon>
    </span>
    <span class="shell__add-menu-label">Add Roll</span>
  </button>
  
  <button class="shell__add-menu-item" (click)="onAddOption('photo')">
    <span class="shell__add-menu-icon" aria-hidden="true">
      <ng-icon name="lucideImage"></ng-icon>
    </span>
    <span class="shell__add-menu-label">Add Photo</span>
  </button>
</div>

<main class="shell__content">
  <router-outlet />
</main>

<nav class="shell__nav" aria-label="Navigationbar">
  <!-- Left Tabs -->
  <div class="shell__nav-group">
    @for (item of navItemsLeft; track item.path) {
      <a class="shell__nav-item" [routerLink]="item.path" routerLinkActive="shell__nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }" [attr.aria-label]="item.label">
        <span class="shell__nav-icon" aria-hidden="true">
          <ng-icon [name]="item.icon"></ng-icon>
        </span>
      </a>
    }
  </div>

  <!-- Spacer to hold space for the floating button -->
  <div class="shell__nav-spacer" aria-hidden="true"></div>

  <!-- Right Tabs -->
  <div class="shell__nav-group">
    @for (item of navItemsRight; track item.path) {
      <a class="shell__nav-item" [routerLink]="item.path" routerLinkActive="shell__nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }" [attr.aria-label]="item.label">
        <span class="shell__nav-icon" aria-hidden="true">
          <ng-icon [name]="item.icon"></ng-icon>
        </span>
      </a>
    }
  </div>
</nav>

<!-- Central Action Button (Placed outside <nav> to escape stacking context) -->
<button 
  class="shell__nav-action-btn" 
  [class.shell__nav-action-btn--active]="isAddMenuOpen()" 
  aria-label="Add new entry" 
  (click)="toggleAddMenu()">
  <span class="shell__nav-action-icon" aria-hidden="true">
    <ng-icon name="lucidePlus"></ng-icon>
  </span>
</button>
