<div
  class="form-field-container"
  [class.has-error]="control().touched && control().invalid">
  <label
    [for]="computedId()"
    class="form-label">
    {{ label() }}
  </label>

  <div class="input-wrapper">
    <input
      [id]="computedId()"
      [type]="type()"
      [formControl]="control()"
      [placeholder]="placeholder()"
      class="form-input" />

    @if (!!control().value) {
      <button
        type="button"
        class="clear-button"
        (click)="clearControl()">
        <ng-icon name="lucideCircleX"></ng-icon>
      </button>
    }
  </div>

  @if (control().touched && control().invalid) {
    @if (control().hasError('required')) {
      <span class="form-error">{{ label() }} is required.</span>
    } @else if (control().hasError('minlength')) {
      <span class="form-error">
        Minimum length is
        {{ control().errors?.['minlength']?.requiredLength }} characters.
      </span>
    }
  }
</div>
