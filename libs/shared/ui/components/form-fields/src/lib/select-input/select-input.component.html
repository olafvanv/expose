<div
  class="form-field"
  [class.has-error]="control().touched && control().invalid">
  <label
    [for]="computedId()"
    class="form-label">
    {{ label() }}
  </label>

  <button
    class="trigger-btn"
    type="button"
    [disabled]="disableTriggerBtn()"
    (click)="open()">
    {{ selectedLabel() ?? placeholderComputed() }}
  </button>

  @if (control().touched && control().invalid) {
    @if (control().hasError('required')) {
      <span class="form-error">{{ label() }} is required.</span>
    }
  }
</div>

<ng-template #dropdownSheet>
  <div
    class="pop-up-container"
    animate.leave="closing"
    cdkTrapFocus>
    <div class="sheet-handle"></div>
    <div class="top-bar">
      <label class="label">{{ label() }}</label>
      <button (click)="clear()">Clear</button>
    </div>
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="list-item"
        [class.selected]="option.value === value()"
        (click)="select(option.value)">
        <span class="option-label">
          {{ option.label }}
        </span>
        <span class="selected-slot">
          @if (option.value === value()) {
            <ng-icon name="lucideCheck"></ng-icon>
          }
        </span>
      </button>
    }
  </div>
</ng-template>
