<div class="empty-state">
  <div class="empty-icon-wrapper">
    <ng-icon
      [name]="icon()"
      class="empty-icon"></ng-icon>
  </div>
  <h2 class="empty-title">{{ title() }}</h2>
  <p class="empty-description">{{ message() }}</p>

  @if(button()) {
  <a
    [routerLink]="button()?.path"
    class="expose-btn expose-btn--accent">
    @if(button()?.icon) {
    <ng-icon [name]="button()?.icon"></ng-icon>
    } {{button()?.label}}
  </a>
  }
</div>
