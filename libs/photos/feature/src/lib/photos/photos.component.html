<div class="photos-container">
  <!-- Loading state -->
  @if (photoStateService.loading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading photos...</p>
    </div>
  } @else {
    <div class="photos-grid">
      @for (photo of photosWithMetadata(); track photo.id) {
        <lib-photo-card
          [photo]="photo"
          (edit)="onEdit($event)"
          (delete)="onDelete($event)">
        </lib-photo-card>
      } @empty {
        <lib-empty-state
          icon="lucideCamera"
          title="No photos logged yet"
          message="Keep track of your camera settings, film roll, light condition, and notes for every photo you take."
          [button]="{ icon: 'lucidePlus', label: 'Log Photo', path: 'new' }" />
      }
    </div>
  }
</div>
