<div class="photo-form-container">
  <form
    class="photo-form"
    [formGroup]="photoForm"
    (ngSubmit)="onSave()">
    <lib-text-input
      label="Subject"
      [control]="photoForm.controls.subject" />

    <div class="form-subheader">Exposure</div>

    <lib-scroll-picker
      label="Aperture"
      [control]="photoForm.controls.aperture"
      [options]="apertureFormOptions" />

    <lib-scroll-picker
      label="Shutter speed"
      [control]="photoForm.controls.shutterSpeed"
      [options]="shutterSpeedOptions" />

    <lib-scroll-picker
      label="ISO"
      [control]="photoForm.controls.iso"
      [options]="isoOptions" />

    <div class="form-subheader">Light conditions</div>

    <lib-grid-picker
      [control]="photoForm.controls.lightCondition"
      [options]="lightConditionOptions" />

    <lib-counter
      [control]="photoForm.controls.frameNumber"
      label="Framenumber"
      [options]="{ min: 1, max: 36, steps: 1 }" />

    <lib-select-input
      [control]="photoForm.controls.rollId"
      label="Roll"
      [options]="rollOptions()" />

    <lib-select-input
      [control]="photoForm.controls.sessionId"
      label="Session"
      [options]="sessionOptions()" />
  </form>
</div>
