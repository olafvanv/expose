<div class="photo-form-container">
  <form
    class="photo-form"
    [formGroup]="photoForm"
    (ngSubmit)="onSave()"
    class="photo-form">
    <lib-text-input
      label="Subject"
      [control]="photoForm.controls.subject" />

    <lib-scroll-picker
      label="Aperture"
      [control]="photoForm.controls.aperture"
      [options]="apertureFormOptions" />
  </form>
</div>
